<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天父的信 | 先知繪畫祝福卡線上版 (200金句尊榮版)</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle, #1a1625 0%, #0a0810 100%);
            color: #ffffff;
            font-family: 'Noto Serif TC', 'Georgia', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            text-align: center;
            max-width: 750px;
            padding: 40px 25px;
            z-index: 2;
        }

        h1 {
            font-size: 2.6rem;
            color: #f3e5ab;
            letter-spacing: 6px;
            margin-bottom: 5px;
            text-shadow: 0 0 15px rgba(243, 229, 171, 0.3);
        }

        .subtitle {
            font-size: 1rem;
            color: #a29bfe;
            margin-bottom: 50px;
            letter-spacing: 2px;
        }

        .card-display {
            min-height: 550px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 45px;
        }

        .art-image-box {
            width: 350px;
            height: 350px;
            border-radius: 12px;
            border: 1px solid rgba(243, 229, 171, 0.4);
            background: rgba(255, 255, 255, 0.03);
            margin-bottom: 30px;
            display: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
            overflow: hidden;
            transition: all 0.5s ease;
        }

        .art-image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .status-text {
            font-size: 1.3rem;
            color: #a29bfe;
            font-style: italic;
            opacity: 0;
            display: none;
            transition: opacity 0.5s ease;
        }

        .message-text {
            font-size: 1.5rem;
            line-height: 2;
            color: #ffffff;
            text-align: center;
            max-width: 600px;
            min-height: 120px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
        }

        .footer-info {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 25px;
        }

        .signature {
            font-size: 1.2rem;
            color: #f3e5ab;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        .source-tag {
            font-size: 1rem;
            color: #a29bfe;
            margin-top: 10px;
            font-style: italic;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 1s ease 0.3s, transform 1s ease 0.3s;
        }

        .seek-btn {
            background: transparent;
            border: 2px solid #f3e5ab;
            color: #f3e5ab;
            padding: 16px 50px;
            font-size: 1.2rem;
            cursor: pointer;
            border-radius: 30px;
            letter-spacing: 3px;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(243, 229, 171, 0.1);
        }

        .seek-btn:hover:not(:disabled) {
            background: #f3e5ab;
            color: #1a1625;
            box-shadow: 0 0 25px rgba(243, 229, 171, 0.5);
            transform: scale(1.03);
        }

        .seek-btn:disabled {
            border-color: #4a4355;
            color: #4a4355;
            cursor: not-allowed;
            transform: scale(0.98);
        }

        .glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(243, 229, 171, 0.04) 0%, rgba(0,0,0,0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            pointer-events: none;
        }

        .show { display: block !important; opacity: 1 !important; }
        .show-source { opacity: 1 !important; transform: translateY(0) !important; }
    </style>
</head>
<body>

    <div class="glow"></div>

    <div class="container">
        <h1>天父的信</h1>
        <div class="subtitle">先知繪畫祝福卡 ‧ 聆聽心靈的指引</div>

        <div class="card-display">
            <div id="artBox" class="art-image-box">
                <img id="artImg" src="" alt="先知繪畫">
            </div>
            
            <div id="status" class="status-text">正在為您翻閱天父的話語...</div>
            <div id="message" class="message-text">請閉上雙眼、安靜心靈，默想你的問題...</div>
            
            <div class="footer-info">
                <div id="signature" class="signature">── 愛你的天父</div>
                <div id="sourceTag" class="source-tag"></div>
            </div>
        </div>

        <button id="seekBtn" class="seek-btn" onclick="drawCard()">抽取天父的信</button>
    </div>

    <script>
        let propheticCards = [];

        async function loadVerses() {
            try {
                const response = await fetch('https://api.jsonbin.io/v3/b/669389f4ad19ca34f887532f?meta=false');
                propheticCards = await response.json();
            } catch (error) {
                console.error("雲端載入失敗，啟用備用本地金句", error);
                propheticCards = [
                    { text: "應當一無掛慮，只要凡事藉著禱告、祈求和感謝，將你們所要的告訴神。", source: "腓立比書 4:6 (新譯本)" },
                    { text: "當將你的事交託耶和華，並倚靠祂，祂就必成全。", source: "詩篇 37:5 (新譯本)" },
                    { text: "我留下平安給你們，我把我的平安賜給你們。", source: "約翰福音 14:27 (新譯本)" }
                ];
            }
        }

        loadVerses();

        const flipAudio = new Audio('https://assets.mixkit.co/active_storage/sfx/2567/2567-84.wav');
        const bellAudio = new Audio('https://assets.mixkit.co/active_storage/sfx/2004/2004-84.wav');
        flipAudio.volume = 0.5;
        bellAudio.volume = 0.4;

        const placeholderImages = [
            "https://images.unsplash.com/photo-1518531933037-91b2f5f229cc?w=400",
            "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=400",
            "https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=400",
            "https://images.unsplash.com/photo-1490730141103-6cac27aaab94?w=400",
            "https://images.unsplash.com/photo-1447752875215-b2761acb3c5d?w=400"
        ];

        function typeWriter(text, i, fnCallback) {
            if (i < text.length) {
                document.getElementById("message").innerHTML = text.substring(0, i + 1);
                setTimeout(function() {
                    typeWriter(text, i + 1, fnCallback)
                }, 55);
            } else if (typeof fnCallback == 'function') {
                setTimeout(fnCallback, 200);
            }
        }

        function drawCard() {
            if (propheticCards.length === 0) return;

            const btn = document.getElementById('seekBtn');
            const status = document.getElementById('status');
            const message = document.getElementById('message');
            const artBox = document.getElementById('artBox');
            const artImg = document.getElementById('artImg');
            const signature = document.getElementById('signature');
            const sourceTag = document.getElementById('sourceTag');

            btn.disabled = true;
            message.innerHTML = "";
            signature.classList.remove('show');
            sourceTag.classList.remove('show-source');
            artBox.classList.remove('show');
            
            status.classList.add('show');
            try { flipAudio.play(); } catch(e) {}

            setTimeout(() => {
                status.classList.remove('show');
                
                const randomIndex = Math.floor(Math.random() * propheticCards.length);
                const result = propheticCards[randomIndex];
                const fullText = `「${result.text}」`;

                const randomImg = placeholderImages[Math.floor(Math.random() * placeholderImages.length)];
                artImg.src = randomImg;
                artBox.classList.add('show');

                try { bellAudio.play(); } catch(e) {}
                
                typeWriter(fullText, 0, function() {
                    signature.classList.add('show');
                    sourceTag.innerText = `出處：${result.source}`;
                    sourceTag.classList.add('show-source');
                    btn.disabled = false;
                });

            }, 2000);
        }
    </script>
</body>
</html>
