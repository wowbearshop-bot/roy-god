<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天父的信 | 先知繪畫祝福卡線上版 (新譯本)</title>
    <style>
        /* 全域樣式：營造神聖沉靜、療癒的氛圍 */
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle, #1a1625 0%, #0a0810 100%);
            color: #ffffff;
            font-family: 'Noto Serif TC', 'Georgia', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 主容器 */
        .container {
            text-align: center;
            max-width: 650px;
            padding: 30px 20px;
            z-index: 2;
        }

        h1 {
            font-size: 2.4rem;
            color: #f3e5ab; /* 柔和金 */
            letter-spacing: 6px;
            margin-bottom: 5px;
            text-shadow: 0 0 15px rgba(243, 229, 171, 0.3);
        }

        .subtitle {
            font-size: 0.95rem;
            color: #a29bfe;
            margin-bottom: 40px;
            letter-spacing: 2px;
        }

        /* 卡片與答案顯示區 */
        .card-display {
            min-height: 380px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 35px;
        }

        /* 預留給先知繪畫的圖片外框（預設隱藏，抽卡後優雅浮現） */
        .art-image-box {
            width: 160px;
            height: 160px;
            border-radius: 12px;
            border: 1px solid rgba(243, 229, 171, 0.4);
            background: rgba(255, 255, 255, 0.03);
            margin-bottom: 25px;
            display: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
            overflow: hidden;
            transition: all 0.5s ease;
        }

        .art-image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 正在翻閱的提示文字 */
        .status-text {
            font-size: 1.2rem;
            color: #a29bfe;
            font-style: italic;
            opacity: 0;
            display: none;
            transition: opacity 0.5s ease;
        }

        /* 訊息文字顯示區 */
        .message-text {
            font-size: 1.4rem;
            line-height: 1.9;
            color: #ffffff;
            text-align: center;
            max-width: 520px;
            min-height: 100px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
        }

        /* 署名與經文出處區 */
        .footer-info {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
        }

        .signature {
            font-size: 1.1rem;
            color: #f3e5ab;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        .source-tag {
            font-size: 0.9rem;
            color: #a29bfe;
            margin-top: 8px;
            font-style: italic;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 1s ease 0.3s, transform 1s ease 0.3s; /* 署名出現後稍微延遲淡入 */
        }

        /* 抽取按鈕 */
        .seek-btn {
            background: transparent;
            border: 2px solid #f3e5ab;
            color: #f3e5ab;
            padding: 14px 45px;
            font-size: 1.15rem;
            cursor: pointer;
            border-radius: 25px;
            letter-spacing: 3px;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(243, 229, 171, 0.1);
        }

        .seek-btn:hover:not(:disabled) {
            background: #f3e5ab;
            color: #1a1625;
            box-shadow: 0 0 25px rgba(243, 229, 171, 0.5);
            transform: scale(1.03);
        }

        .seek-btn:disabled {
            border-color: #4a4355;
            color: #4a4355;
            cursor: not-allowed;
            transform: scale(0.98);
        }

        /* 背景微弱光暈效果 */
        .glow {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(243, 229, 171, 0.04) 0%, rgba(0,0,0,0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            pointer-events: none;
        }

        /* 動態顯示用的輔助 CSS */
        .show { display: block !important; opacity: 1 !important; }
        .show-source { opacity: 1 !important; transform: translateY(0) !important; }
    </style>
</head>
<body>

    <div class="glow"></div>

    <div class="container">
        <h1>天父的信</h1>
        <div class="subtitle">先知繪畫祝福卡 ‧ 聆聽心靈的指引</div>

        <div class="card-display">
            <div id="artBox" class="art-image-box">
                <img id="artImg" src="" alt="先知繪畫">
            </div>
            
            <div id="status" class="status-text">正在為您翻閱天父的話語...</div>
            
            <div id="message" class="message-text">請閉上雙眼、安靜心靈，默想你的問題...</div>
            
            <div class="footer-info">
                <div id="signature" class="signature">── 愛你的天父</div>
                <div id="sourceTag" class="source-tag"></div>
            </div>
        </div>

        <button id="seekBtn" class="seek-btn" onclick="drawCard()">抽取天父的信</button>
    </div>

    <script>
        // 完整的 99 張先知性祝福卡（結合聖經新譯本與精確出處）
        const propheticCards = [
            { id: 1, text: "我親愛的孩子：應當一無掛慮，只要凡事藉著禱告、祈求和感謝，將你們所要的告訴神。我必親自用出人意外的平安，守護你的心懷意念。", source: "腓立比書 4:6-7 (新譯本)" },
            { id: 2, text: "蒙我喜悅的孩子：當將你的事交託耶和華，並倚靠祂，祂就必成全。不要焦慮，耐性等候，我必在最適當的時刻親自為你引導。", source: "詩篇 37:5 (新譯本)" },
            { id: 3, text: "我寶貝的孩子：你要專心仰賴耶和華，不可倚靠自己的聰明。在你一切所行的事上，都要認定祂，祂必指引你的路。", source: "箴言 3:5-6 (新譯本)" },
            { id: 4, text: "尊貴的孩子：不要為明天憂慮，因為明天自有明天的憂慮。一天的難處一天當就夠了。今天就安息在我的愛裡，卸下你所有的重擔。", source: "馬太福音 6:34 (新譯本)" },
            { id: 5, text: "我深愛的孩子：我們知道，為了愛神的人的益處，就是按祂旨意被召的人，萬事都互相效力。你眼前的波折，都將成為你未來豐盛的祝福。", source: "羅馬書 8:28 (新譯本)" },
            { id: 6, text: "親的孩子：耶和華必在你前面行，祂必與你同在，必不撇下你，也不丟棄你。不要懼怕，也不要驚惶。我是你堅固的避難所。", source: "申命記 31:8 (新譯本)" },
            { id: 7, text: "蒙愛的孩子：疲乏的，祂賜能力；無力的，祂加力量。當你覺得精疲力竭、無路可走時，回到我身邊，我的恩典必重新托住你。", source: "以賽亞書 40:29 (新譯本)" },
            { id: 8, text: "我喜悅的孩子：你們祈求，就給你們；尋找，就尋見；叩門，就給你們開門。帶著信心向我祈求吧，我一直都在垂聽你的聲音。", source: "馬太福音 7:7 (新譯本)" },
            { id: 9, text: "孩子：我的恩典是夠你用的，因為我的能力是在人的軟弱上顯得完全。所以，不要因自己的軟弱而灰心，那正是我的大能要彰顯的時候。", source: "哥林多後書 12:9 (新譯本)" },
            { id: 10, text: "親愛的孩子：在信的人，凡事都能。不要被眼前的局勢與不可能限制了你的眼界，在我的大能裡，帶著信心的腳步必能跨越一切困難。", source: "馬可福音 9:23 (新譯本)" },
            { id: 11, text: "我珍愛的孩子：凡事都有定時，天下萬務都有定期。生有時，死有時；栽種有時，拔出所栽種的也有時。耐性等候，不要因急躁而失去了平安。", source: "傳道書 3:1-2 (新譯本)" },
            { id: 12, text: "蒙召的孩子：草必枯乾，花必凋殘，唯有我們神的話永遠立定。這世界的一切都會改變，但我的應許和對你的慈愛，永不動搖。", source: "以賽亞書 40:8 (新譯本)" },
            { id: 13, text: "我眷顧的孩子：你們要休息，要知道我是神。在奔波和焦慮中，停下你的腳步，讓我為你的靈魂注入平靜，重新得著前進的力量。", source: "詩篇 46:10 (新譯本)" },
            { id: 14, text: "有智慧的孩子：因為祂的怒氣只有轉眼之間，祂的恩典卻是一生之久。雖然一宿有哭泣，早晨便必歡呼。擦乾眼淚吧，新的一天我已為你預備喜樂。", source: "詩篇 30:5 (新譯本)" },
            { id: 15, text: "我護庇的孩子：唯有忍耐到底的，必然得救。在這條考驗你信心的道路上，不要中途放棄，我必在終點用榮耀的冠冕迎接你。", source: "馬太福音 24:13 (新譯本)" },
            { id: 16, text: "親愛的孩子：主是我的幫助，我必不懼怕，人能把我怎麼樣呢？當世界與你對立時，記住我是你堅實的後盾，沒有任何人能從我手中奪走你。", source: "希伯來書 13:6 (新譯本)" },
            { id: 17, text: "蒙愛的孩子：你們中間若有缺少智慧的，應當求那厚賜與眾人、也不斥責人的神，主就必賜給他。帶著謙卑前來，我必將天上的智慧賜予你。", source: "雅各書 1:5 (新譯本)" },
            { id: 18, text: "我引領的孩子：手扶著犁向後看的，不配進神的國。放下過去的遺憾，不要再回頭看那些讓你跌倒的事，今天就與我攜手，向著標竿直跑。", source: "路加福音 9:62 (新譯本)" },
            { id: 19, text: "寶貴的孩子：人心籌算自己的道路，唯有耶和華指引他的腳步。你只管盡心去預備，但請將最終的結果交託給我，我的帶領絕不會出錯。", source: "箴言 16:9 (新譯本)" },
            { id: 20, text: "我同行的孩子：生死在舌頭的權下，喜愛它的，必吃它所結的果子。今天，試著說造就、鼓勵與祝福的話，你的言語將會改變你的環境。", source: "箴言 18:21 (新譯本)" },
            { id: 21, text: "剛強的孩子：你當默然倚靠耶和華，耐性等候祂；不要因那道路通達的和惡謀成就的心懷不平。公義在我，我必為你平反一切冤屈。", source: "詩篇 37:7 (新譯本)" },
            { id: 22, text: "我恩待的孩子：我們行善，不可喪志；若不灰心，到了時候就要收成。你的付出與善良我全都看在眼裡，到了豐收的季節，你必看見榮耀的成果。", source: "加拉太書 6:9 (新譯本)" },
            { id: 23, text: "親愛的孩子：耶和華是我的牧者，我必一無所缺。祂使我躺臥在青草地上，領我到安靜的水邊。信靠我，我必供應你生命中一切的需要。", source: "詩篇 23:1-2 (新譯本)" },
            { id: 24, text: "我造就的孩子：我雖然使你走過死蔭的幽谷，你也不用怕遭害，因為我與你同在；你的杖、你的竿，都安慰我。考驗是為了讓你更加強壯。", source: "詩篇 23:4 (新譯本)" },
            { id: 25, text: "蒙恩的孩子：在我敵人面前，你為我擺設宴席；你用油膏了我的頭，使我的杯滿溢。我的恩典豐盛，隨時準備在眾人面前向你施恩。", source: "詩篇 23:5 (新譯本)" },
            { id: 26, text: "我呼喚的孩子：我一生一世必有恩惠慈愛跟隨著我，我還要住在耶和華的殿中，直到永遠。這是我對你永恆的承諾，我的愛從不撤回。", source: "詩篇 23:6 (新譯本)" },
            { id: 27, text: "親愛的孩子：你要保守你心，勝過保守一切，因為生命的泉源由心發出。保護好你內心的平靜與良善，不要讓外在的混亂污染了你的心田。", source: "箴言 4:23 (新譯本)" },
            { id: 28, text: "我安慰的孩子：神是我們的避難所，是我們的力量，是我們在患難中隨時的幫助。不論外在風浪多大，你在我懷裡永遠能找到安息。", source: "詩篇 46:1 (新譯本)" },
            { id: 29, text: "有能力的孩子：但那等候耶和華的，必重新得力；他們必像鷹一樣展翅上騰；他們奔跑，也不困倦；他們行走，也不疲乏。耐性等候我吧。", source: "以賽亞書 40:31 (新譯本)" },
            { id: 30, text: "我守護的孩子：因為我深知我為你們所懷的意念，是賜平安的意念，不是降災禍的意念，要給你們前途和盼望。相信我為你所規劃的未來。", source: "耶利米書 29:11 (新譯本)" },
            { id: 31, text: "親愛的孩子：你們要呼求我，求我，我就必應允你們。你們尋找我，若一心尋求，就必尋見。不要將心事憋在心裡，隨時向我傾心吐意吧。", source: "耶利米書 29:12-13 (新譯本)" },
            { id: 32, text: "蒙福的孩子：因為神賜給我們的，不是膽怯的心，而是剛強、仁愛、自律的心。抬起頭來，帶著信心和愛，勇敢地面對今天的一切挑戰。", source: "提摩太後書 1:7 (新譯本)" },
            { id: 33, text: "我深愛的孩子：愛是恆久忍耐，又有恩慈；愛是不嫉妒，愛是不自誇，不張狂。讓我的愛先充滿你，使你也有能力用這份溫柔去愛身邊的人。", source: "哥林多前書 13:4 (新譯本)" },
            { id: 34, text: "勇敢的孩子：愛裡沒有懼怕，完全的愛可以把懼怕驅除。因為懼怕含有懲罰，懼怕的人在愛裡還沒有完全。我的愛一直在保護著你，不用害怕。", source: "約hn一書 4:18 (新譯本)" },
            { id: 35, text: "我同在的孩子：你們的光也應當照在人前，讓他們看見你們的好行為，光大你們在天上的父。你的一舉一動，都在向這世界傳遞溫暖和希望。", source: "馬太福音 5:16 (新譯本)" },
            { id: 36, text: "親愛的孩子：你們要饒恕人，就必蒙饒恕。原諒那些傷害你的人，不是寬容他們的惡，而是將你自己從仇恨的鎖鏈中釋放出來，得著自由。", source: "路加福音 6:37 (新譯本)" },
            { id: 37, text: "蒙愛的孩子：祂醫治傷心的人，裹好他們的傷處。我看見了你內心深處那不為人知的痛，讓我溫柔的雙手親自撫平你所有的創傷。", source: "詩篇 147:3 (新譯本)" },
            { id: 38, text: "我引導的孩子：因為主耶和華是我的力量，祂使我的腳快如母鹿的蹄，又使我步履在高處。有我與你同行，你必能跨越一切崎嶇的山頭。", source: "哈巴谷書 3:19 (新譯本)" },
            { id: 39, text: "寶貴的孩子：你們要將一切憂慮卸給神，因為祂顧念你們。不要獨自背負重擔了，那不是你應得的重量，今天就把一切交託給我吧。", source: "彼得前書 5:7 (新譯本)" },
            { id: 40, text: "我喜悅的孩子：神能把各樣的恩惠多多地加給你們，使你們凡事常常充足，多行各樣善事。當你成為分享愛的人，我的供應也必加倍傾倒給你。", source: "哥林多後書 9:8 (新譯本)" },
            { id: 41, text: "親愛的孩子：不要懷念過去，也不要留戀往事。看哪！我要作一件新事；現在它要發生了，難道你們還不知道嗎？我必在曠野開道路，在荒地開江河。", source: "以賽亞書 43:18-19 (新譯本)" },
            { id: 42, text: "蒙召的孩子：你在我眼中是寶貴的、備受尊重的，我愛你。所以，不要看輕自己的價值，你是我手中最得意的傑作，是我珍愛的寶貝。", source: "以賽亞書 43:4 (新譯本)" },
            { id: 43, text: "我眷顧的孩子：耶和華以勒，在耶和華的山上必有預備。不論是生活上的缺乏，還是心靈上的乾渴，我都在關鍵的時刻為你預備最豐盛的供應。", source: "創世記 22:14 (新譯本)" },
            { id: 44, text: "有智慧的孩子：公義的路通往生命，其上的通道沒有死亡。不要羨慕惡人一時的通達，選擇走誠實、公義的路，這條路必帶你走向長久的平安。", source: "箴言 12:28 (新譯本)" },
            { id: 45, text: "我護庇的孩子：回答柔和，使怒氣消退；言語暴戾，激起怒氣。在衝突與摩擦中，選擇用溫柔回答，這不是軟弱，而是內在擁有強大力量的展現。", source: "箴言 15:1 (新譯本)" },
            { id: 46, text: "親愛的孩子：你們不知道你們的身體就是聖靈的殿嗎？這聖靈是從神而來，住在你們裡面的。請好好愛惜你的身體，給自己充足的休息與呵護。", source: "哥林多前書 6:19 (新譯本)" },
            { id: 47, text: "蒙愛的慢孩子：你要盡心、盡性、盡意、盡力愛主你的神，並且要愛鄰如己。當你將愛放在生活的核心時，人際關係的糾葛自然會迎刃而解。", source: "馬可福音 12:30-31 (新譯本)" },
            { id: 48, text: "我引領的孩子：因為那在你們裡面的，比那在世界上的更大。不論外在的挑戰多麼嚴峻，住在你裡面的聖靈帶有得勝的能力，你必能安然度過。", source: "約翰一書 4:4 (新譯本)" },
            { id: 49, text: "寶貴的孩子：因為義人雖然跌倒七次，仍能站起來。失敗與挫折不過是成功的學費，拍拍身上的灰塵，靠著我的力量，勇敢地再次站立吧！", source: "箴言 24:16 (新譯本)" },
            { id: 50, text: "我同行的孩子：兩個人總比一個人好，因為他們一起勞碌同得美好的果效。我已在你的生命中安插了志同道合的夥伴，打開心門，彼此扶持前行。", source: "傳道書 4:9 (新譯本)" },
            { id: 51, text: "剛強的孩子：主是我的岩石、我的山寨、我的救主；我的神、我的磐石、我所投靠的。有我作為你的避難所，任何風雨都動搖不了你。", source: "詩篇 18:2 (新譯本)" },
            { id: 52, text: "我恩待的孩子：要常常喜樂，常常禱告，凡事謝恩；因為這是神在基督耶穌裡對你們的旨意。當你開始數算恩典，焦慮與抱怨將會悄悄退去。", source: "帖撒羅尼迦前書 5:16-18 (新譯本)" },
            { id: 53, text: "親愛的孩子：祂按著名字呼召自己的羊，領牠們出來。在我眼裡你是獨一無二的，我深知你所有的軟弱與優點，我對你的計劃絕不會與他人混淆。", source: "約翰福音 10:3 (新譯本)" },
            { id: 54, text: "我造就的孩子：我的意念高過你們的意念，我的道路高過你們的道路。當計劃趕不上變化時，不要慌張，這代表著我正為你預備一個更好的轉折。", source: "以賽亞書 55:9 (新譯本)" },
            { id: 55, text: "蒙恩的孩子：我留下平安給你們，我把我的平安賜給你們。我賜給你們的，不像世人所賜的。你們心裡不要憂慮，也不要膽怯。安息在我的平安裡。", source: "約翰福音 14:27 (新譯本)" },
            { id: 56, text: "我呼喚的孩子：但那等候耶和華的，必重新得力。不要讓生活消磨了你的熱情，回到我的施恩寶座前，我必親自為你注入全新的熱情與異象。", source: "以賽亞書 40:31 (新譯本)" },
            { id: 57, text: "親愛的孩子：污穢的話一句都不可出口，只要隨事說造就人的好話，使聽見的人得益處。用你的言語作鹽作光，將溫暖傳遞給周圍受傷的人。", source: "以弗所書 4:29 (新譯本)" },
            { id: 58, text: "我安慰的孩子：耶和華親近傷心的人，拯救靈性痛悔的人。我看見了你為這件事所流的眼淚，我正坐在你的身邊，溫柔地用愛撫平你的痛楚。", source: "詩篇 34:18 (新譯本)" },
            { id: 59, text: "有能力的孩子：因為神賜給我們的，不是膽怯的心，而是剛強、仁愛、自律的心。所以，不要看輕自己的力量，你已被賦予勝過環境的權柄。", source: "提摩太後書 1:7 (新譯本)" },
            { id: 60, text: "我守護的孩子：祂必用自己的翎毛遮蔽你，你要投靠在祂的翅膀底下；祂的信實是大小盾牌。我的保護無微不至，放下你的緊繃，安然入睡吧。", source: "詩篇 91:4 (新譯本)" },
            { id: 61, text: "親愛的孩子：聽從規勸的人，卻得著生命。不要為了一時的盲目或討好而妥協了真理，堅持做對的事，雖然過程寂寞，但生命的路必走得無比踏實。", source: "箴言 10:17 (新譯本)" },
            { id: 62, text: "蒙福的孩子：你出你入，耶和華要保護你，從今時直到永遠。不論你在外打拼，還是回到家中，我的慈愛必隨時隨地如影隨形地環繞你。", source: "詩篇 121:8 (新譯本)" },
            { id: 63, text: "我深愛的孩子：我聽見了你的祈求，我看見了你的眼淚；看哪！我必醫治你。不要對希望失望，我正親自動手，為你的生命帶來奇妙的翻轉。", source: "列王紀下 20:5 (新譯本)" },
            { id: 64, text: "勇敢的孩子：你們要作剛強的人，要靠著祂的大能大力。不要害怕去挑戰全新的未知領域，因為創造宇宙的大能者正握著你的手與你並肩作戰。", source: "以弗所書 6:10 (新譯本)" },
            { id: 65, text: "我同在的孩子：我必不撇下你，也不丟棄你。即使全世界都離開你，我的手依然拉著你。我是你最忠實的朋友，生生世世守護著你。", source: "約書亞記 1:5 (新譯本)" },
            { id: 66, text: "親愛的孩子：與智慧人同行的，必得著智慧；與愚昧人作伴的，必受虧損。學會保護你自己的能量，多與那些能激勵你、帶給你正面力量的人交往。", source: "箴言 13:20 (新譯本)" },
            { id: 67, text: "蒙愛的孩子：如果你們有信心像一粒芥菜種，就是對這座山說：『從這裡移到那裡』，它也必移過去，在你們沒有辦不到的事。單純地相信吧！", source: "馬太福音 17:20 (新譯本)" },
            { id: 68, text: "我引導的孩子：因為看一日如千載，看千載如一日。不要著急，你的生命正在按照最完美的步調成熟著，在對的季節裡，你必看見最美的花開。", source: "彼得後書 3:8 (新譯本)" },
            { id: 69, text: "寶貴的孩子：忘記背後，努力面前的，向著標竿直跑。過去的錯誤與遺憾已在我的恩典裡被抹去，不要再自我控訴，今天就帶著喜樂昂首前行。", source: "腓立比書 3:13-14 (新譯本)" },
            { id: 70, text: "我喜悅的孩子：你們是世上的鹽……你們是世上的光。你的生命很有價值，不要隱藏你的善意與才能，去照亮並調和身邊那個冰冷、缺乏色彩的世界吧。", source: "馬太福音 5:13-14 (新譯本)" },
            { id: 71, text: "親愛的孩子：神要擦去他們一切的眼淚，不再有死亡，也不再有悲哀、哭號、疼痛。這一切都將過去，我必用雙倍的喜樂代替你曾經歷的苦楚。", source: "啟示錄 21:4 (新譯本)" },
            { id: 72, text: "蒙召的孩子：耶和華是我的亮光，是我的拯救，我還怕誰呢？耶和華是我性命的保障，我還懼怕誰呢？有我保護你，你可以大膽、自信地生活。", source: "詩篇 27:1 (新譯本)" },
            { id: 73, text: "我眷顧的孩子：凡勞苦擔重擔的人，到我這裡來吧，我必使你們得安息。不用再自己撐著了，今天就向我卸下你的疲憊，讓我溫柔地擁抱你。", source: "馬太福音 11:28 (新譯本)" },
            { id: 74, text: "有智慧的孩子：不輕易發怒的，勝過勇士；克服己心的，勝過奪城的人。在面對挑釁與不公時，守住你內心的平靜，那是你最強大的得勝武器。", source: "箴言 16:32 (新譯本)" },
            { id: 75, text: "我護庇的孩子：不要自己伸冤，寧可等候神的震怒……伸冤在我，我必報應。把那些刻意中傷、虧待你的人交給我吧，我必用公義來為你伸張。", source: "羅馬書 12:19 (新譯本)" },
            { id: 76, text: "親愛的孩子：因為作惡的必被剪除，唯有等候耶和華的，必承受地土。在等待的過程中不要心灰意冷，堅持做對的事，你必看見最終美好的結局。", source: "詩篇 37:9 (新譯本)" },
            { id: 77, text: "蒙愛的孩子：因為人看外貌，耶和華看內心。你不需要追求外在的包裝與迎合他人的掌聲。我看重的是你真實、善良且謙卑的內心，你已極其寶貴。", source: "撒母耳記上 16:7 (新譯本)" },
            { id: 78, text: "我引領的孩子：看哪！我要在曠野開道路，在荒地開江河。即便前方的路看似斷了，也不要驚慌，這正是我要為你展現奇妙新出路的時刻。", source: "以賽亞書 43:19 (新譯本)" },
            { id: 79, text: "寶貴的孩子：耶和華是我的產業，是我杯中的分；我所得的業分，你親自為我持守。你不用與人競爭，我為你預備的福分是專屬於你、無人能奪的。", source: "詩篇 16:5 (新譯本)" },
            { id: 80, text: "我同行的孩子：我們雖然處處受壓，卻沒有被壓碎；心裡困惑，卻未至絕望。瓶頸只是暫時的，突破的曙光已在眼前，再堅持信靠我一下。", source: "哥林多後書 4:8 (新譯本)" },
            { id: 81, text: "剛強的孩子：主耶和華是我的力量，祂使我的腳快如母鹿的蹄，又使我步履在高處。不要被困難阻擋，靠著我，你必能安然躍過險阻的山頭。", source: "哈巴谷書 3:19 (新譯本)" },
            { id: 82, text: "我恩待的孩子：這是耶和華所定的日子，我們要在這日歡喜快樂！今天，試著放下對未來的憂慮，好好享受我賜給你的陽光、微風與當下的恩典。", source: "詩篇 118:24 (新譯本)" },
            { id: 83, text: "親愛的孩子：不要為明天憂慮，因為明天自有明天的憂慮。把你的未來交在我的手裡，那是全宇宙最安全的地方。今天，就喜樂地活在當下吧。", source: "馬太福音 6:34 (新譯本)" },
            { id: 84, text: "我造就的孩子：祂必把你們高舉。當你覺得被忽略、被埋沒時，其實是我在隱密處塑造你的品格。到了最成熟的時刻，我必親自將你推上該站的舞台。", source: "雅各書 4:10 (新譯本)" },
            { id: 85, text: "蒙恩的孩子：我們原是神所作成的工，在基督耶穌裡創造的，為要叫我們行善。釋放我放在你裡面的創造力與恩賜，大膽地去寫作、手作與生活吧！", source: "以弗所書 2:10 (新譯本)" },
            { id: 86, text: "我呼喚的孩子：當你祈禱的時候，要進到你的密室裡，關上門，向你在隱密中的父祈禱。今天給自己十分鐘的寂靜，在安靜中與我的靈親密交談。", source: "馬太福音 6:6 (新譯本)" },
            { id: 87, text: "親愛的孩子：你們要彼此接納，就像基督接納了你們一樣，使榮耀歸於神。多一分包容，少一分苛求，用我的愛去恩待身邊那些與你不同的人。", source: "羅馬書 15:7 (新譯本)" },
            { id: 88, text: "我安慰的孩子：祂醫治傷心的人，裹好他們的傷處。親自把你的傷痛交給我，不要讓過去的痛在暗處化膿，我的愛能徹底潔淨並療癒你所有的創傷。", source: "詩篇 147:3 (新譯本)" },
            { id: 89, text: "有能力的孩子：我靠著那加給我力量的，凡事都能作。不要害怕被交付更重的責任，當我把擔子交給你時，我已經將相應的智慧與力量賜給你了。", source: "腓立比書 4:13 (新譯本)" },
            { id: 90, text: "我守護的孩子：因為我深信：無論是死、是活……都不能使我們與神的愛隔絕。不論你犯了什麼錯、經歷了什麼低谷，我對你的愛永不動搖，隨時回來吧。", source: "羅馬書 8:38-39 (新譯本)" },
            { id: 91, text: "親愛的孩子：各人要照著所得的恩賜彼此服事，作神百般恩賜的好管家。不要試圖掌控他人，用愛和禱告代替控制，將他們全然交託在我的手中。", source: "彼得前書 4:10 (新譯本)" },
            { id: 92, text: "蒙福的孩子：喜樂的心乃是良藥，憂傷的靈使骨枯乾。多笑一笑吧！學會用喜樂和幽默來化解生活中的壓力，喜樂的靈將成為你身體最好的免疫力。", source: "箴言 17:22 (新譯本)" },
            { id: 93, text: "我深愛的孩子：耶和華你的神在你中間，祂是大能的拯救者；祂必因你歡欣喜樂，在祂的愛中靜默，且因你高歌歡呼。你是我的驕傲，我深深愛你。", source: "西番雅書 3:17 (新譯本)" },
            { id: 94, text: "勇敢的孩子：求你使我在早晨得聽你的慈愛，因為我倚靠你；求你指示我當行的路，因為我向你舉心。在做決定前，先安靜下來聆聽我給你的直覺。", source: "詩篇 143:8 (新譯本)" },
            { id: 95, text: "我同在的孩子：祂必因你歡喜。我看見了你一路上默默的堅持與付出，你真的做得很好。今天，給自己一點掌聲，放鬆地享受我賜給你的這一天吧。", source: "西番雅書 3:17 (新譯本)" },
            { id: 96, text: "親愛的孩子：生氣卻不要犯罪；含怒不可到日落。不要讓憤怒在你的心裡過夜，在入睡前選擇釋懷、原諒與交託，給你的靈魂一個乾淨溫暖的安眠。", source: "以弗所書 4:26 (新譯本)" },
            { id: 97, text: "蒙愛的孩子：因為主耶和華看重你。你不需要做什麼去證明自己的價值，你的生命本身就是極致的無價之寶，今天就安心地躺在我的愛中享受安息吧。", source: "以賽亞書 43:4 (新譯本)" },
            { id: 98, text: "我引導的孩子：看哪！我要作一件新事。舊的事情已經過去，新的恩典即將進來。用期待與信心的眼光，迎接我為你量身打造的全新起點吧！", source: "以賽亞書 43:19 (新譯本)" },
            { id: 99, text: "寶貴的孩子：我留下平安給你們，我把我的平安賜給你們。不論世局多麼動盪，我就是你的家，你的避風港。帶著我的平安，喜樂地度過每一天吧！", source: "約翰福音 14:27 (新譯本)" }
        ];

        // 預備線上音效庫 (翻書聲 & 靈性磬聲)
        const flipAudio = new Audio('https://assets.mixkit.co/active_storage/sfx/2567/2567-84.wav');
        const bellAudio = new Audio('https://assets.mixkit.co/active_storage/sfx/2004/2004-84.wav');
        flipAudio.volume = 0.5;
        bellAudio.volume = 0.4;

        // 預留的高質感、與主題契合的免版權 Unsplash 隨機圖片
        const placeholderImages = [
            "https://images.unsplash.com/photo-1518531933037-91b2f5f229cc?w=300", // 光芒與晨霧
            "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=300", // 壯麗群山
            "https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=300", // 療癒波浪
            "https://images.unsplash.com/photo-1490730141103-6cac27aaab94?w=300", // 溫暖黎明
            "https://images.unsplash.com/photo-1447752875215-b2761acb3c5d?w=300"  // 靜謐森林
        ];

        // 經典打字機效果 JS 邏輯
        function typeWriter(text, i, fnCallback) {
            if (i < text.length) {
                document.getElementById("message").innerHTML = text.substring(0, i + 1);
                setTimeout(function() {
                    typeWriter(text, i + 1, fnCallback)
                }, 55); // 調整此處數字可增減打字速度
            } else if (typeof fnCallback == 'function') {
                setTimeout(fnCallback, 200);
            }
        }

        function drawCard() {
            const btn = document.getElementById('seekBtn');
            const status = document.getElementById('status');
            const message = document.getElementById('message');
            const artBox = document.getElementById('artBox');
            const artImg = document.getElementById('artImg');
            const signature = document.getElementById('signature');
            const sourceTag = document.getElementById('sourceTag');

            // 1. 初始化介面狀態，鎖定按鈕
            btn.disabled = true;
            message.innerHTML = "";
            signature.classList.remove('show');
            sourceTag.classList.remove('show-source');
            artBox.classList.remove('show');
            
            // 2. 顯示翻書等待提示，並播放沙沙聲
            status.classList.add('show');
            try { flipAudio.play(); } catch(e) { console.log("音效播感受瀏覽器安全機制限制，點擊網頁互動後即可正常發聲"); }

            // 3. 模擬 2 秒的安靜沉澱等待
            setTimeout(() => {
                status.classList.remove('show');
                
                // 隨機抽選 99 組中的其中一組
                const randomIndex = Math.floor(Math.random() * propheticCards.length);
                const result = propheticCards[randomIndex];
                const fullText = `「${result.text}」`;

                // 隨機挑選一張美麗的意境底圖
                const randomImg = placeholderImages[Math.floor(Math.random() * placeholderImages.length)];
                artImg.src = randomImg;
                artBox.classList.add('show');

                // 4. 播放清脆神聖磬聲，並觸發打字機動態
                try { bellAudio.play(); } catch(e) {}
                
                typeWriter(fullText, 0, function() {
                    // 打字結束後，優雅淡入署名與新譯本經文出處，並釋放抽取按鈕
                    signature.classList.add('show');
                    
                    sourceTag.innerText = `出處：${result.source}`;
                    sourceTag.classList.add('show-source');
                    
                    btn.disabled = false;
                });

            }, 2000);
        }
    </script>
